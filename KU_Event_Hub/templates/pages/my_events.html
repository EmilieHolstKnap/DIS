{% extends "base.html" %}

{% block title %}My Events{% endblock %}

{% block content %}

<h1>My Saved Events</h1>

{% if events %}

    <div class="events-grid">
        {% for event in events %}
            <div class="event-card">

                <h2>
                    <a href="{{ url_for('event.event_details', event_id=event[0]) }}">
                        {{ event[1] }}
                    </a>
                </h2>

                <p>{{ event[2] }}</p>
                <p>{{ event[3] }}</p>
                <p>{{ event[4] }}</p>

                <form method="POST"
                    action="{{ url_for('event.unsave', event_id=event[0]) }}">
                    <button type="submit">Unsave</button>
                </form>

            </div>
        {% endfor %}
    </div>

{% else %}

    <p>You have not saved any events yet.</p>

{% endif %}

{% endblock %}
